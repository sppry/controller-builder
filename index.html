<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCUF Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050607;
      --panel: #020202;
      --line: #262626;
      --accent: #1aa3a3;
      --accent-2: #2ec4b6;
      --muted: #7f7f82;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      margin: 0;
      background: var(--bg);
      color: #fff;
      font-family: 'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    }
    .app { height: 100dvh; min-height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .top {
      display: flex;
      align-items: center;
      background:
        radial-gradient(140% 100% at 0% 0%, rgba(15, 67, 78, 0.35) 0%, rgba(4, 7, 12, 0) 55%),
        linear-gradient(180deg, #040709 0%, #030405 100%);
      border-bottom: 1px solid #111;
      padding: 0 20px;
      height: 68px;
      gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 8px; min-width: 160px; }
    .logo span { font-size: 42px; font-weight: 900; letter-spacing: 1px; color: #fff; line-height: 1; transform: scaleX(.7); transform-origin: left center; }
    .logo svg { width: 30px; height: 30px; }
    .tabs { display: flex; flex: 1; overflow: auto; }
    .tab {
      background: none;
      border: none;
      border-bottom: 3px solid #3b3b3b;
      color: #f6f6f6;
      font-size: 18px;
      letter-spacing: 1px;
      padding: 0 28px;
      height: 68px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      text-transform: uppercase;
      font-weight: 700;
    }
    .tab.active { color: #fff; border-bottom-color: #fff; font-weight: 900; }
    .tab small { display: block; font-size: 12px; color: #9d9da1; margin-top: 2px; font-weight: 600; letter-spacing: .5px; }
    .tab.active small { color: var(--accent); }
    .pn { display: flex; gap: 6px; }
    .pn button {
      border: none;
      color: #111;
      width: 42px;
      height: 42px;
      border-radius: 0;
      cursor: pointer;
      font-size: 24px;
      background: #173739;
      font-weight: 700;
    }
    .pn button.active { background: var(--accent); }

    .body { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .left {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 18px 8px;
      background: #050607;
      position: relative;
    }
    .left::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .exit-lab {
      position: absolute;
      left: 28px;
      top: 20px;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 28px;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
      transform: scaleX(.72);
      transform-origin: left center;
      cursor: pointer;
      z-index: 2;
    }
    .preview-wrap {
      width: 100%;
      max-width: min(980px, calc(100vw - 460px));
      position: relative;
      z-index: 1;
    }
    .preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      min-height: clamp(280px, 52vh, 620px);
      border-radius: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }
    .controller-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform: scale(1.18);
      transform-origin: center 52%;
      pointer-events: none;
      z-index: 1;
    }
    .trim-part-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 3;
      transition: all .25s ease;
      opacity: 1;
      mix-blend-mode: normal;
      transform-origin: center center;
    }
    .part-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 5;
      opacity: 1;
      mix-blend-mode: normal;
      transform-origin: center center;
    }
    .part-adjust {
      margin-top: 12px;
      border-top: 1px solid #171717;
      padding-top: 10px;
    }
    .part-adjust .h2 {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #fff;
    }
    .part-adjust .r {
      display: grid;
      grid-template-columns: 20px 1fr 42px;
      gap: 8px;
      align-items: center;
      margin-bottom: 7px;
    }
    .part-adjust .r label { font-size: 11px; color: #aaa; font-weight: 700; }
    .part-adjust .r .v { font-size: 11px; text-align: right; color: #fff; font-weight: 700; }
    .trim-area-tint {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      transition: all .25s ease;
      mix-blend-mode: multiply;
      clip-path: polygon(
        30.2% 35.2%,
        69.8% 35.2%,
        75.6% 39.7%,
        88.8% 57.2%,
        97.8% 95.8%,
        90.8% 100%,
        73.8% 59.8%,
        26.2% 59.8%,
        9.2% 100%,
        2.2% 95.8%,
        11.2% 57.2%,
        24.4% 39.7%
      );
      opacity: .82;
      filter: blur(.25px);
    }
    .tint {
      position: absolute;
      pointer-events: none;
      transition: all .3s;
      z-index: 2;
      mix-blend-mode: multiply;
    }
    .face-tint { inset: 0; border-radius: 12px; }
    .shell-tint {
      left: 0;
      right: 0;
      bottom: 0;
      height: 45%;
      border-radius: 0 0 12px 12px;
    }
    .fallback { z-index: 0; }
    .controller {
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      width: 78%;
      height: 62%;
      border-radius: 42% 42% 40% 40% / 58% 58% 40% 40%;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .controller::before, .controller::after {
      content: "";
      position: absolute;
      bottom: -20%;
      width: 33%;
      height: 45%;
      background: var(--shell, #1a1a1a);
      border-radius: 40px;
      opacity: 0.9;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .controller::before { left: 7%; transform: rotate(18deg); }
    .controller::after { right: 7%; transform: rotate(-18deg); }
    .trim {
      position: absolute;
      top: 30%;
      left: 33%;
      right: 33%;
      height: 6px;
      border-radius: 4px;
      background: var(--trim, #111);
      opacity: 0.7;
      filter: blur(1px);
    }
    .view-toggle {
      margin-top: 10px;
      display: flex;
      background: #111;
      border-radius: 0;
      overflow: hidden;
      border: 1px solid #666;
      z-index: 1;
    }
    .view-toggle button {
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #d6d6d6;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1.5px;
      font-family: inherit;
      text-transform: uppercase;
    }
    .view-toggle button.active { background: #efefef; color: #111; }

    .sel { margin-top: 8px; text-align: center; z-index: 1; }
    .sel .a { font-size: 12px; color: #7f7f82; letter-spacing: 2px; }
    .sel .b { font-size: clamp(24px, 3.2vh, 36px); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
    .sel .c { font-size: clamp(14px, 2vh, 16px); color: var(--accent); margin-top: 2px; letter-spacing: 1px; }

    .right { width: clamp(360px, 31vw, 460px); min-height: 0; background: #000; border-left: 1px solid #111; display: flex; flex-direction: column; }
    .ph { padding: 10px 16px 8px; border-bottom: 1px solid #141414; }
    .ph .k { font-size: 14px; color: #f1f1f1; letter-spacing: 1px; margin-bottom: 4px; font-weight: 700; text-transform: uppercase; }
    .ph .t { font-size: clamp(28px, 4.2vh, 42px); font-weight: 900; letter-spacing: .5px; line-height: 1; text-transform: uppercase; }
    .ph .d { font-size: clamp(12px, 1.8vh, 14px); color: #b1b1b5; margin-top: 6px; line-height: 1.35; }

    .opts { flex: 1; min-height: 0; padding: 10px 16px; overflow-y: auto; }
    .opts .h { font-size: 15px; color: #fff; letter-spacing: 1px; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; }
    .grid { display: flex; flex-wrap: wrap; gap: 10px 14px; }
    .sw {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 2px solid #b6b6ba;
      box-shadow: 0 0 0 2px #101010 inset;
      cursor: pointer;
      transition: all .18s;
      outline: none;
    }
    .sw.selected {
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 2px #101010 inset;
      transform: scale(1.15);
    }
    .sw-label { font-size: 16px; color: #f1f1f1; text-align: center; max-width: 86px; line-height: 1; font-weight: 700; transform: scaleX(.78); transform-origin: center top; }
    .sw-price { font-size: 12px; color: var(--accent); font-weight: 700; }

    .trig { display: flex; flex-wrap: wrap; gap: 12px; }
    .to {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid #2a2a2a;
      border-radius: 0;
      padding: 10px 12px;
      cursor: pointer;
      min-width: 94px;
      color: #aaa;
    }
    .to.selected { background: color-mix(in srgb, var(--accent) 22%, transparent); border-color: var(--accent); color: #fff; }
    .to i { width: 30px; height: 30px; border-radius: 6px; border: 1px solid #444; display: block; }
    .to span { font-size: 12px; font-weight: 600; letter-spacing: .5px; }
    .to b { font-size: 10px; color: var(--accent); }

    .price { border-top: 1px solid #161616; padding: 8px 16px 10px; }
    .price .h { font-size: 12px; color: #f5f5f5; letter-spacing: 1px; margin-bottom: 6px; font-weight: 800; text-transform: uppercase; }
    .line { display: flex; justify-content: space-between; font-size: 12px; color: #b5b5bb; }
    .line.plus { color: var(--accent); }
    .subtotal {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid var(--line);
      padding-top: 6px;
      margin-top: 6px;
      margin-bottom: 8px;
    }
    .subtotal .l { font-size: 16px; color: var(--accent); letter-spacing: 1px; font-weight: 900; text-transform: uppercase; transform: scaleX(.8); transform-origin: left center; }
    .subtotal .v { font-size: clamp(28px, 4vh, 40px); font-weight: 900; color: #fff; }
    .cta { display: flex; justify-content: center; }
    .btn { padding: 10px 0; border-radius: 0; cursor: pointer; font-family: inherit; }
    .next {
      width: min(280px, 100%);
      border: none;
      color: #111;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      transform: scaleX(.9);
      transform-origin: center;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
      box-shadow: none;
    }

    @media (max-width: 980px) {
      .body { flex-direction: column; }
      .right { width: 100%; border-left: none; border-top: 1px solid var(--line); }
      .preview-wrap { max-width: 100%; }
      .preview { min-height: 300px; }
      .controller-img { transform: scale(1.05); }
      .sw { width: 94px; height: 94px; }
      .sw-label { max-width: 94px; font-size: 22px; }
      .ph .t { font-size: 36px; }
      .subtotal .v { font-size: 34px; }
      .tab { font-size: 13px; padding: 0 14px; }
      .view-toggle button, .next { font-size: 16px; transform: none; }
      .exit-lab { font-size: 18px; transform: none; }
    }
  </style>
</head>

    function parseColorToRgb(color) {
      if (!color) return { r: 255, g: 255, b: 255 };
      const c = color.trim().toLowerCase();
      if (c.startsWith("#")) {
        let hex = c.slice(1);
        if (hex.length === 3) {
          hex = hex.split("").map((v) => v + v).join("");
        }
        if (hex.length === 6) {
          const n = parseInt(hex, 16);
          if (!Number.isNaN(n)) {
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
          }
        }
      }
      const m = c.match(/rgba?\(([^)]+)\)/);
      if (m) {
        const parts = m[1].split(",").map((v) => parseFloat(v.trim()));
        return {
          r: Math.max(0, Math.min(255, Math.round(parts[0] || 0))),
          g: Math.max(0, Math.min(255, Math.round(parts[1] || 0))),
          b: Math.max(0, Math.min(255, Math.round(parts[2] || 0)))
        };
      }
      return { r: 255, g: 255, b: 255 };
    }

    function getAlphaBounds(data, w, h) {
      let minX = w, minY = h, maxX = -1, maxY = -1;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = (y * w + x) * 4;
          if (data[idx + 3] > 0) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      if (maxX < minX || maxY < minY) return null;
      return { minX, minY, maxX, maxY };
    }

    function removeWhiteBackground(url, removeBg = true, normalize = true, targetHeightRatio = FRONT_CONTENT_HEIGHT_RATIO, targetWidthRatio = FRONT_CONTENT_WIDTH_RATIO) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width;
            const h = canvas.height;
            const visited = new Uint8Array(w * h);
            const stack = [];

            function isBgPixel(idx) {
              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              const a = data[idx + 3];
              const max = Math.max(r, g, b);
              const min = Math.min(r, g, b);
              const lowSaturation = (max - min) <= 22;
              return a > 0 && r >= WHITE_BG_THRESHOLD && g >= WHITE_BG_THRESHOLD && b >= WHITE_BG_THRESHOLD && lowSaturation;
            }

            function pushIfBg(x, y) {
              if (x < 0 || y < 0 || x >= w || y >= h) return;
              const p = y * w + x;
              if (visited[p]) return;
              const idx = p * 4;
              if (!isBgPixel(idx)) return;
              visited[p] = 1;
              stack.push(p);
            }

            if (removeBg) {
              // Seed flood-fill from all borders only.
              for (let x = 0; x < w; x++) {
                pushIfBg(x, 0);
                pushIfBg(x, h - 1);
              }
              for (let y = 1; y < h - 1; y++) {
                pushIfBg(0, y);
                pushIfBg(w - 1, y);
              }

              while (stack.length) {
                const p = stack.pop();
                const x = p % w;
                const y = (p - x) / w;
                const idx = p * 4;
                data[idx + 3] = 0;

                pushIfBg(x + 1, y);
                pushIfBg(x - 1, y);
                pushIfBg(x, y + 1);
                pushIfBg(x, y - 1);
              }

              // Feather near-edge remnants for cleaner cutout.
              for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                  const p = y * w + x;
                  const idx = p * 4;
                  if (data[idx + 3] === 0) continue;
                  const r = data[idx], g = data[idx + 1], b = data[idx + 2];
                  const nearWhite = r >= (WHITE_BG_THRESHOLD - 6) && g >= (WHITE_BG_THRESHOLD - 6) && b >= (WHITE_BG_THRESHOLD - 6);
                  if (!nearWhite) continue;
                  const n1 = data[((p - 1) * 4) + 3] === 0;
                  const n2 = data[((p + 1) * 4) + 3] === 0;
                  const n3 = data[((p - w) * 4) + 3] === 0;
                  const n4 = data[((p + w) * 4) + 3] === 0;
                  if (n1 || n2 || n3 || n4) {
                    data[idx + 3] = Math.min(data[idx + 3], 120);
                  }
                }
              }
            }

            ctx.putImageData(imageData, 0, 0);
            if (!normalize) {
              resolve({ src: canvas.toDataURL("image/png") });
              return;
            }

            const bounds = getAlphaBounds(imageData.data, w, h);
            if (!bounds) {
              resolve({ src: canvas.toDataURL("image/png") });
              return;
            }

            const bw = bounds.maxX - bounds.minX + 1;
            const bh = bounds.maxY - bounds.minY + 1;
            const out = document.createElement("canvas");
            out.width = w;
            out.height = h;
            const octx = out.getContext("2d");

            // Normalize processed part images into a consistent visual box.
            const targetH = h * targetHeightRatio;
            const targetWMax = w * targetWidthRatio;
            let scale = targetH / Math.max(bh, 1);
            if (bw * scale > targetWMax) {
              scale = targetWMax / Math.max(bw, 1);
            }

            const drawW = bw * scale;
            const drawH = bh * scale;
            const drawX = (w - drawW) / 2;
            const drawY = (h - drawH) / 2;

            octx.clearRect(0, 0, w, h);
            octx.drawImage(
              canvas,
              bounds.minX, bounds.minY, bw, bh,
              drawX, drawY, drawW, drawH
            );

            resolve({ src: out.toDataURL("image/png") });
          } catch (e) {
            resolve({ src: url });
          }
        };
        img.onerror = () => resolve({ src: url });
        img.src = url;
      });
    }

    function tintTrimTemplate(color) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const d = id.data;
            const base = parseColorToRgb(color);

            // Measure luminance range on visible pixels so we can normalize shading.
            let minLum = 1;
            let maxLum = 0;
            for (let i = 0; i < d.length; i += 4) {
              if (d[i + 3] === 0) continue;
              const lum = (0.2126 * d[i] + 0.7152 * d[i + 1] + 0.0722 * d[i + 2]) / 255;
              if (lum < minLum) minLum = lum;
              if (lum > maxLum) maxLum = lum;
            }
            const lumRange = Math.max(0.001, maxLum - minLum);
            const isVeryLight = (base.r + base.g + base.b) / 3 > 220;
            const isVeryDark = (base.r + base.g + base.b) / 3 < 35;

            for (let i = 0; i < d.length; i += 4) {
              const a = d[i + 3];
              if (a === 0) continue;

              const lum = (0.2126 * d[i] + 0.7152 * d[i + 1] + 0.0722 * d[i + 2]) / 255;
              const n = Math.max(0, Math.min(1, (lum - minLum) / lumRange));
              const eased = Math.pow(n, 0.88);

              // Keep shape detail but avoid muddy colors.
              if (isVeryLight) {
                // Keep white trim visibly white: bright cool-neutral range with subtle shading only.
                const tone = Math.round(242 + (eased * 13)); // 242..255
                d[i] = Math.max(0, Math.min(255, tone - 2));    // R
                d[i + 1] = Math.max(0, Math.min(255, tone - 1)); // G
                d[i + 2] = Math.max(0, Math.min(255, tone));    // B
                continue;
              }

              let strength = 0.42 + (eased * 0.82);
              if (isVeryDark) strength = 0.28 + (eased * 0.78);

              const r = Math.round(base.r * strength);
              const g = Math.round(base.g * strength);
              const b = Math.round(base.b * strength);

              // Add small neutral highlight from source for glossy depth.
              const hi = Math.round(16 * Math.pow(eased, 1.4));
              d[i] = Math.max(0, Math.min(255, r + hi));
              d[i + 1] = Math.max(0, Math.min(255, g + hi));
              d[i + 2] = Math.max(0, Math.min(255, b + hi));
            }

            ctx.putImageData(id, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch (e) {
            resolve(TRIM_TEMPLATE_IMG);
          }
        };
        img.onerror = () => resolve(TRIM_TEMPLATE_IMG);
        img.src = TRIM_TEMPLATE_IMG;
      });
    }

    function tintPartTemplate(templateUrl, color) {
      return new Promise((resolve) => {
        if (!templateUrl) {
          resolve("");
          return;
        }
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const d = id.data;
            const base = parseColorToRgb(color);

            for (let i = 0; i < d.length; i += 4) {
              const a = d[i + 3];
              if (a === 0) continue;
              const lum = (0.2126 * d[i] + 0.7152 * d[i + 1] + 0.0722 * d[i + 2]) / 255;
              const shade = 0.34 + (lum * 0.78);
              d[i] = Math.max(0, Math.min(255, Math.round(base.r * shade)));
              d[i + 1] = Math.max(0, Math.min(255, Math.round(base.g * shade)));
              d[i + 2] = Math.max(0, Math.min(255, Math.round(base.b * shade)));
            }

            ctx.putImageData(id, 0, 0);
            resolve(canvas.toDataURL("image/png"));
          } catch (e) {
            resolve(templateUrl);
          }
        };
        img.onerror = () => resolve(templateUrl);
        img.src = templateUrl;
      });
    }

      trim.style.display = fallbackVisible && isFront ? "block" : "none";

      faceTint.style.background = primary;
      faceTint.style.opacity = primary === "#f0f0f0" || primary === "#ececec" ? "0" : "0.28";
      shellTint.style.background = sh;
      shellTint.style.opacity = sh === "#1a1a1a" || sh === "#111" ? "0" : "0.22";

      topView.className = isFront ? "active" : "";
      bottomView.className = isFront ? "" : "active";
    }

    function renderMeta() {
      const sectionName = SECTIONS[state.activeSection].replace(/^\d+\.\s*/, "");
      const key = currentKey();
      const chosen = state.selections[key];
      panelTitle.textContent = sectionName;
      panelDesc.textContent = sectionDesc[state.activeSection];
      customizingSection.textContent = sectionName;
      if (key === "smartoptions") {
        customizingChoice.textContent = `D-PAD/BUTTONS: ${state.smartOptions.dpadButtons} | TRIGGERS/BUMPERS: ${state.smartOptions.triggersBumpers}`;
      } else {
        customizingChoice.textContent = `${chosen.name}${chosen.price > 0 ? ` | +$${chosen.price}` : " | Included"}`;
      }
    }

    function renderPrice() {
      priceRows.innerHTML = "";

      const base = document.createElement("div");
      base.className = "line";
      base.innerHTML = `<span>Base DualSense</span><span>$${BASE_PRICE.toFixed(2)}</span>`;
      priceRows.appendChild(base);

      Object.entries(state.selections).forEach(([k, v]) => {
        if (v.price > 0) {
          const row = document.createElement("div");
          row.className = "line plus";
          row.innerHTML = `<span style="text-transform:capitalize;">${k}</span><span>+$${v.price.toFixed(2)}</span>`;
          priceRows.appendChild(row);
        }
      });

      if (state.smartOptions.dpadButtons === "SMART") {
        const row = document.createElement("div");
        row.className = "line plus";
        row.innerHTML = `<span>D-PAD / BUTTONS SMART</span><span>+$25.00</span>`;
        priceRows.appendChild(row);
      }
      if (state.smartOptions.triggersBumpers === "SMART") {
        const row = document.createElement("div");
        row.className = "line plus";
        row.innerHTML = `<span>TRIGGERS / BUMPERS SMART</span><span>+$25.00</span>`;
        priceRows.appendChild(row);
      }

      subtotal.textContent = `$${totalPrice().toFixed(2)}`;
    }

    function selectOption(option) {
      const key = currentKey();
      state.selections[key] = option;
      if (key === "faceplate" && option.image) {
        state.frontImage = option.image;
      }
      state.view = state.activeSection === 2 ? "back" : "front";
      render();
    }

    function render() {
      renderTabs();
      renderOptions();
      renderPreview();
      renderMeta();
      renderPrice();
      pricePanel.style.display = currentKey() === "summary" ? "none" : "block";
      nextStep.textContent = state.activeSection < SECTIONS.length - 1 ? "NEXT" : "ADD TO CART";
      saveConfigState();
    }

    prevBtn.onclick = () => {
      state.activeSection = Math.max(0, state.activeSection - 1);
      render();
    };

    nextBtn.onclick = () => {
      state.activeSection = Math.min(SECTIONS.length - 1, state.activeSection + 1);
      render();
    };

    topView.onclick = () => { state.view = "front"; render(); };
    bottomView.onclick = () => { state.view = "back"; render(); };

    nextStep.onclick = () => {
      state.activeSection = Math.min(SECTIONS.length - 1, state.activeSection + 1);
      render();
    };
    resetMain.onclick = resetAllConfig;

    function startPartDrag(e, partKey) {
      const key = currentKey();
      const keyMatches = key === partKey || (key === "buttons" && partKey.startsWith("btn"));
      if (partKey === "dpad" || partKey === "actionbuttons") return;
      if (state.view !== "front" || !keyMatches || state.lockedParts[partKey]) return;
      partDrag.active = true;
      partDrag.part = partKey;
      partDrag.startX = e.clientX;
      partDrag.startY = e.clientY;
      partDrag.baseX = state.partAdjust[partKey].x;
      partDrag.baseY = state.partAdjust[partKey].y;
      e.target.setPointerCapture(e.pointerId);
      e.preventDefault();
    }

    function movePartDrag(e) {
      if (!partDrag.active || !partDrag.part) return;
      const partKey = partDrag.part;
      state.partAdjust[partKey].x = partDrag.baseX + (e.clientX - partDrag.startX);
      state.partAdjust[partKey].y = partDrag.baseY + (e.clientY - partDrag.startY);
      savePartAdjust();
      renderPreview();
      const partX = document.getElementById("partX");
      const partY = document.getElementById("partY");
      const partXVal = document.getElementById("partXVal");
      const partYVal = document.getElementById("partYVal");
      if (partX) partX.value = String(Math.round(state.partAdjust[partKey].x));
      if (partY) partY.value = String(Math.round(state.partAdjust[partKey].y));
      if (partXVal) partXVal.textContent = `${Math.round(state.partAdjust[partKey].x)}`;
      if (partYVal) partYVal.textContent = `${Math.round(state.partAdjust[partKey].y)}`;
    }

    function endPartDrag() {
      partDrag.active = false;
      partDrag.part = "";
    }

    [
      { el: button1Overlay, key: "btn1" },
      { el: button2Overlay, key: "btn2" },
      { el: button3Overlay, key: "btn3" },
      { el: button4Overlay, key: "btn4" },
      { el: dpadOverlay, key: "dpad" },
      { el: actionButtonsOverlay, key: "actionbuttons" }
    ].forEach((item) => {
      item.el.addEventListener("pointerdown", (e) => startPartDrag(e, item.key));
      item.el.addEventListener("pointermove", movePartDrag);
      item.el.addEventListener("pointerup", endPartDrag);
      item.el.addEventListener("pointercancel", endPartDrag);
    });

    render();
  </script>
</body>
</html>
